<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fibonacci Calculator</title>
  <link rel="stylesheet" href="input.css">
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center px-4">
  <div class="flex flex-col md:flex-row w-full max-w-5xl bg-gray-900 rounded-xl shadow-lg overflow-hidden">

    <!-- Left: Input Form -->
    <div class="md:w-1/2 p-8 border-r border-gray-800">
      <h2 class="text-2xl font-bold mb-6 text-blue-400">Enter OHLC or Pivot Value</h2>

      <div class="space-y-4">
        <div>
          <label for="open" class="block mb-1 text-sm font-medium">Open</label>
          <input type="number" id="open" class="input-box" />
        </div>
        <div>
          <label for="high" class="block mb-1 text-sm font-medium">High</label>
          <input type="number" id="high" class="input-box" />
        </div>
        <div>
          <label for="low" class="block mb-1 text-sm font-medium">Low</label>
          <input type="number" id="low" class="input-box" />
        </div>
        <div>
          <label for="close" class="block mb-1 text-sm font-medium">Close</label>
          <input type="number" id="close" class="input-box" />
        </div>

        <div class="pt-4 border-t border-gray-700">
          <label for="manualPivot" class="block mb-1 text-sm font-medium text-yellow-400">OR Enter Pivot Directly</label>
          <input type="number" id="manualPivot" class="input-box" placeholder="Optional: Enter Pivot Value" />
        </div>

        <button id="calculateBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-2 rounded-md font-semibold cursor-pointer">
          Calculate Fibonacci Levels
        </button>

        <div class="flex gap-2 items-center pt-4">
          <label for="lowerBound" class="text-sm">Lower Bound</label>
          <input id="lowerBound" type="number" step="0.01" class="input-box w-24" />
          <label for="upperBound" class="text-sm">Upper Bound</label>
          <input id="upperBound" type="number" step="0.01" class="input-box w-24" />
          <button id="exportBtn" class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-md font-semibold cursor-pointer">Export CSV</button>
        </div>
      </div>
    </div>

    <!-- Right: Results -->
    <div class="md:w-1/2 p-8 bg-gray-800">
      <h2 class="text-2xl font-bold mb-6 text-green-400">Fibonacci Levels</h2>
      <p id="pivotDisplay" class="text-sm text-gray-300 mb-4">Pivot: --</p>
      <p id="Velo" class="text-sm text-gray-300 mb-4">Velo: --</p>
      <p id="SQRT" class="text-sm text-gray-300 mb-4">SQRT --</p>
      <table class="w-full text-left text-sm">
        <thead class="border-b border-gray-600 text-white">
          <tr>
            <th class="px-2 py-1">Δ</th>
            <th class="px-2 py-1">+Δ</th>
            <th class="px-2 py-1">−Δ</th>
          </tr>
        </thead>
        <tbody id="results" class="text-gray-300">
          <tr><td colspan="3" class="text-center py-4 text-gray-400">Results will appear here after calculation.</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <style>
    .input-box {
      width: 100%;
      padding: 0.5rem;
      background-color: #1f2937;
      border: 1px solid #374151;
      border-radius: 0.375rem;
      color: white;
      outline: none;
      transition: border 0.2s;
    }

    .input-box:focus {
      border-color: #3b82f6;
    }
  </style>

  <script>
    function generateDeltas(maxInteger = 18) {
  const fractionalParts = [0.21, 0.34, 0.55, 0.70, 0.89];
  const deltas = [0.11, 0.21, 0.34, 0.45, 0.55, 0.70, 0.89]; // Starting seeds

  for (let i = 1; i <= maxInteger; i++) {
    for (const frac of fractionalParts) {
      deltas.push(parseFloat((i + frac).toFixed(2)));
    }
  }

  // Add x.00 endings at the end of each group (optional)
  
  return deltas;
}

    const deltas = generateDeltas(30);
    console.log(deltas);

    window.onload = () => {
      ['open', 'high', 'low', 'close'].forEach(key => {
        const val = localStorage.getItem(key);
        if (val) document.getElementById(key).value = val;
      });
    };

    document.getElementById("calculateBtn").addEventListener("click", () => {
      const open = parseFloat(document.getElementById("open").value);
      const high = parseFloat(document.getElementById("high").value);
      const low = parseFloat(document.getElementById("low").value);
      const close = parseFloat(document.getElementById("close").value);
      const manualPivot = parseFloat(document.getElementById("manualPivot").value);
      const resultsTbody = document.getElementById("results");

      let pivot;
      if (!isNaN(manualPivot)) {
        pivot = manualPivot;
      } else {
        if (isNaN(open) || isNaN(high) || isNaN(low) || isNaN(close)) {
          resultsTbody.innerHTML = `<tr><td colspan="3" class="text-red-400 py-2 text-center">Enter either OHLC or Pivot value.</td></tr>`;
          return;
        }
        if (high < low) {
          resultsTbody.innerHTML = `<tr><td colspan="3" class="text-red-400 py-2 text-center">High can't be less than Low.</td></tr>`;
          return;
        }
        localStorage.setItem('open', open);
        localStorage.setItem('high', high);
        localStorage.setItem('low', low);
        localStorage.setItem('close', close);
        pivot = (open + high + low + close) / 4;
      }
      document.getElementById("pivotDisplay").textContent = `Pivot: ${pivot.toFixed(2)}`;

      const SQRT = Math.sqrt(pivot)
      document.getElementById("SQRT").textContent = `SQRT: ${SQRT.toFixed(15)}`;

      const sqrtPivot = Math.sqrt(pivot);
      const Velo = Math.sqrt(high) - Math.sqrt(low);
      document.getElementById("Velo").textContent = `Velo: ${Velo.toFixed(15)}`;

      const levels = deltas.map(delta => ({
        delta,
        plus: Math.pow(sqrtPivot + delta, 2),
        minus: Math.pow(sqrtPivot - delta, 2)
      }));

      window.latestLevels = levels;

      resultsTbody.innerHTML = levels.map(({ delta, plus, minus }) => `
        <tr class="hover:bg-gray-700">
          <td class="px-2 py-1 font-medium">${delta}</td>
          <td class="px-2 py-1 text-green-400">${plus.toFixed(2)}</td>
          <td class="px-2 py-1 text-red-400">${minus.toFixed(2)}</td>
        </tr>
      `).join("");
    });

    document.getElementById("exportBtn").addEventListener("click", () => {
      const upper = parseFloat(document.getElementById("upperBound").value);
      const lower = parseFloat(document.getElementById("lowerBound").value);

      if (isNaN(upper) || isNaN(lower)) {
        alert("Enter valid upper and lower bounds.");
        return;
      }

      const filtered = (window.latestLevels || []).filter(lvl => lvl.delta >= lower && lvl.delta <= upper);
      let csv = "Delta,Plus,Minus\n" + filtered.map(lvl => `${lvl.delta},${lvl.plus.toFixed(2)},${lvl.minus.toFixed(2)}`).join("\n");

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = "fibonacci_levels.csv";
      link.click();
    });
  </script>
</body>
</html>
