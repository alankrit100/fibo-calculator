<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fibonacci Calculator</title>
  <link rel="stylesheet" href="input.css">
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center px-4">
  <div class="flex flex-col md:flex-row w-full max-w-5xl bg-gray-900 rounded-xl shadow-lg overflow-hidden">
    
    <!-- Left: Input Form -->
    <div class="md:w-1/2 p-8 border-r border-gray-800">
      <h2 class="text-2xl font-bold mb-6 text-blue-400">Enter OHLC Values</h2>
      
      <div class="space-y-4">
        <div>
          <label for="open" class="block mb-1 text-sm font-medium caret-amber-500">Open</label>
          <input type="number" id="open" class="input-box" />
        </div>
        <div>
          <label for="high" class="block mb-1 text-sm font-medium">High</label>
          <input type="number" id="high" class="input-box" />
        </div>
        <div>
          <label for="low" class="block mb-1 text-sm font-medium">Low</label>
          <input type="number" id="low" class="input-box" />
        </div>
        <div>
          <label for="close" class="block mb-1 text-sm font-medium">Close</label>
          <input type="number" id="close" class="input-box" />
        </div>

        <button id="calculateBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-2 rounded-md font-semibold">
          Calculate Fibonacci Levels
        </button>
        <!-- Export Button -->
        <button id="exportBtn" class="mt-4 p-2 bg-blue-500 text-white rounded-lg">
            Export to CSV
        </button>
      </div>
    </div>

    <!-- Right: Results -->
    <div class="md:w-1/2 p-8 bg-gray-800">
      <h2 class="text-2xl font-bold mb-6 text-green-400">Fibonacci Levels</h2>
      <div id="results" class="space-y-2">
        <p class="text-gray-400">Results will appear here after calculation.</p>
      </div>
    </div>

  </div>

  <style>
    .input-box {
      width: 100%;
      padding: 0.5rem;
      background-color: #1f2937;
      border: 1px solid #374151;
      border-radius: 0.375rem;
      color: white;
      outline: none;
      transition: border 0.2s;
    }

    .input-box:focus {
      border-color: #3b82f6;
    }
  </style>
  
  
  <script>
    // Check if the stored values exist and populate the fields
    window.onload = function () {
      if (localStorage.getItem('open')) {
        document.getElementById("open").value = localStorage.getItem('open');
        document.getElementById("high").value = localStorage.getItem('high');
        document.getElementById("low").value = localStorage.getItem('low');
        document.getElementById("close").value = localStorage.getItem('close');
      }
    };
  
    document.getElementById("calculateBtn").addEventListener("click", () => {
      const open = parseFloat(document.getElementById("open").value);
      const high = parseFloat(document.getElementById("high").value);
      const low = parseFloat(document.getElementById("low").value);
      const close = parseFloat(document.getElementById("close").value);
      const resultsDiv = document.getElementById("results");
  
      // Validate the inputs: Check for NaN, High > Low, and correct numerical ranges
      if (isNaN(open) || isNaN(high) || isNaN(low) || isNaN(close)) {
        resultsDiv.innerHTML = `<p class="text-red-400">Please enter valid OHLC values.</p>`;
        return;
      }
  
      if (high < low) {
        resultsDiv.innerHTML = `<p class="text-red-400">High value cannot be less than Low value.</p>`;
        return;
      }
  
      // Save entered values to localStorage
      localStorage.setItem('open', open);
      localStorage.setItem('high', high);
      localStorage.setItem('low', low);
      localStorage.setItem('close', close);
  
      // Calculate pivot value
      const pivot = (open + high + low + close) / 4;
  
      // Calculate the square root of the pivot
      const sqrtPivot = Math.sqrt(pivot);
  
      // Fibonacci levels to calculate
      const deltas = [
        0.21, 0.34, 0.55, 0.70, 0.89, 1.21, 1.34, 1.55, 1.70, 1.89, 2.21, 2.34,
        2.55, 2.70, 2.89, 3.21, 3.34, 3.55, 3.70, 3.89, 4.21, 4.34, 4.55, 4.70,
        4.89, 5.00
      ];
  
      const levels = [];
  
      // Add pivot value for the base level
      levels.push({ level: `Pivot (0)`, value: pivot });
  
      // Calculate Fibonacci levels for both positive and negative deltas
      for (const delta of deltas) {
        const pos = Math.pow(sqrtPivot + delta, 2);
        const neg = Math.pow(sqrtPivot - delta, 2);
        levels.push({ level: `+${delta}`, value: pos });
        levels.push({ level: `-${delta}`, value: neg });
      }
  
      // Sort levels in descending order
      levels.sort((a, b) => b.value - a.value); 
  
      // Render results
      resultsDiv.innerHTML = levels
        .map((lvl, index) => {
          return `
            <div class="flex justify-between items-center py-1 px-2 rounded-lg bg-gradient-to-r from-blue-400 via-green-400 to-green-600 my-1">
              <span class="text-sm text-gray-800">${lvl.level}</span>
              <span class="text-sm font-mono text-white">${lvl.value.toFixed(2)}</span>
            </div>
          `;
        })
        .join("");
    });
  
    // Function to export data to CSV
    document.getElementById("exportBtn").addEventListener("click", () => {
      const upperBound = parseFloat(prompt("Enter the upper bound of Fibonacci levels (e.g., 1.89):"));
      const lowerBound = parseFloat(prompt("Enter the lower bound of Fibonacci levels (e.g., -1.89):"));
      
      if (isNaN(upperBound) || isNaN(lowerBound)) {
        alert("Please enter valid numeric bounds.");
        return;
      }
  
      // Retrieve the levels from the results
      const levels = [];
      const resultsDiv = document.getElementById("results");
      const levelElements = resultsDiv.getElementsByClassName("flex");
  
      for (const element of levelElements) {
        const levelText = element.querySelector("span.text-sm").textContent;
        const valueText = element.querySelector("span.font-mono").textContent;
        const value = parseFloat(valueText);
  
        // Filter levels within the provided bounds
        if (value >= lowerBound && value <= upperBound) {
          levels.push([levelText, value]);
        }
      }
  
      // Prepare the CSV content
      let csvContent = "Level,Value\n"; // CSV header
      levels.forEach(level => {
        csvContent += `${level[0]},${level[1].toFixed(2)}\n`;
      });
  
      // Create a Blob and download the CSV
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = "fibonacci_levels.csv";
      link.click();
    });
  </script>
  
  
  
</body>
</html>
